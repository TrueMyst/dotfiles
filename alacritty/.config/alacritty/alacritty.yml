import:
  - ~/.config/alacritty/themes/gruvbox_dark.yaml

window:
  opacity: 0.95

  dimensions:
    columns: 120 
    lines: 30

  padding:
    x: 10 
    y: 12

  decorations: none 
  decorations_theme_variant: Dark

  class:
    instance: Alacritty
    general: Alacritty

cursor:
  style:
    shape: Beam

  blink_interval: 500
  unfocused_hollow: true
  thickness: 0.27

font:
  normal:
    family: CaskaydiaCove Nerd Font
    style: Medium 

  bold:
    family: CaskaydiaCove Nerd Font
    style: Bold

  italic:
    family: CaskaydiaCove Nerd Font
    style: italic
  
  size: 12
