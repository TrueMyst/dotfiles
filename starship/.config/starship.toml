"$schema" = 'https://starship.rs/config-schema.json'

format = """\
    [в•ӯв•ҙ](240)\
    [оӮІ](bold white)[ пҢғ ](bold bg:white fg:#011627)[оӮІ](bold bg:white fg:black)\
    [оӮІ](bold fg:cyan bg:black)[оҚҫ гҒӨгҒҚ](bold bg:cyan fg:#011627)[оӮІ](bold bg:cyan fg:black)\
    $env_var$all\
    [в•°в”Җ](240)$character"""

add_newline = true

[character]
success_symbol = "[рҹһҲ](bright-cyan)"
error_symbol   = "[рҹһҲ](bright-red)"
vicmd_symbol   = "[рҹһҲ](bright-yellow)"

[package]
disabled = true

[directory]
style             = "bold fg:#333333 bg:black"
home_symbol       = "пҖ• ~"
truncation_length = 4
truncate_to_repo  = false
truncation_symbol = "вҖҰ/"
read_only         = " пҖЈ"
read_only_style   = "bg:#333333 fg:white"
format            = "[оӮІ]($style)[$read_only]($read_only_style)[ $path ](bold bg:#333333 fg:white)[оӮ° ]($style)"

[git_branch]
style  = "fg:#d7875f bg:black"
format = "[оӮІ]($style)[ у°ҠӨ $branch ](bold fg:black bg:#d7875f)[оӮ° ]($style)"

[git_status]
style      = "bg:color_git_status fg:color_foreground_dark"
ahead      = "пҒў ${count} "
behind     = "пҒЈ ${count} "
staged     = "пҖҢ ${count} "
stashed    = "уұүҷ ${count} "
renamed    = "у°‘• ${count} "
deleted    = "пҖҚ ${count} "
diverged   = "пҒҪ ${ahead_count} ${behind_count} "
modified   = "уұҮ§ ${count} "
untracked  = "пҒҷ ${count} "
conflicted = "у°үҖ ${count} "
format     = "[($staged$modified$renamed$untracked$deleted$conflicted$stashed$ahead_behind )]($style)"
