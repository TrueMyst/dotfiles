format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\n$character
"""

add_newline = true

[character]
error_symbol   = "[╬╗](bold red)"
success_symbol = "[╬╗](bold green)"
vicmd_symbol   = "[╬╗](bold yellow)"

[cmd_duration]
style = "bold yellow"
format = "’╣Ötook [$duration]($style)’╣Ü"

[directory]
style     = "bold cyan"
read_only = " ’ĆŻ"
read_only_style = "bold yellow"

[git_branch]
style = "bold magenta"
format = "[¾░Ŗż $branch]($style) "

[git_status]
ahead      = "[’üó ${count}](bold blue) "
behind     = "[’üŻ ${count}](bold cyan) "
staged     = "[’Ćī ${count}](bold green) "
stashed    = "[¾▒ēÖ ${count}](bold purple) "
renamed    = "[’üä ${count}](bold cyan) "
deleted    = "[’ĆŹ ${count}](bold red) "
diverged   = "[’üĮ ${ahead_count} ${behind_count}](bold white) "
modified   = "[¾▒ć¦ ${count}](bold yellow) "
untracked  = "[’üÖ ${count}](bold white) "
conflicted = "[¾░ēĆ ${count}](bold red) "
format     = "($staged$modified$renamed$untracked$deleted$conflicted$stashed$ahead_behind)"
